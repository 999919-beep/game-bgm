function renderPalette(){
    const p=document.getElementById('palette');
    const s=STAGES[currentStageIdx];
    const reqSet=new Set(s.requiredBlocks);
    // カテゴリごとにセクションを作る
    p.innerHTML='';
    p.className='flex flex-col gap-2';
    BLOCK_CATS.forEach(cat=>{
        const sec=document.createElement('div');
        sec.innerHTML=`<div class="text-[10px] font-black px-1 py-0.5 rounded ${cat.color} mb-1">${cat.label}</div>
            <div class="grid grid-cols-3 gap-1">${cat.blocks.map(b=>{
                const highlight=reqSet.has(b.id)?'ring-2 ring-yellow-400':'';
                return `<div class="${b.color} ${highlight} text-white px-2 py-3 rounded-lg font-bold cursor-grab active:scale-95 shadow-sm text-center leading-tight"
                    data-block-id="${b.id}" style="font-size:clamp(10px,1.6vw,12px)"
                    onclick="tapBlock('${b.id}')">${b.text}</div>`;
            }).join('')}</div>`;
        p.appendChild(sec);
    });
    // すべてのカテゴリのグリッドにSortableを登録（最初の1つだけでなく全て）
    if(window._paletteSortables) window._paletteSortables.forEach(s=>s.destroy());
    window._paletteSortables = [];
    p.querySelectorAll('.grid').forEach(grid=>{
        const s = Sortable.create(grid,{
            group:{name:'blocks',pull:'clone',put:false}, sort:false, animation:150,
            forceFallback:true, delay:120, delayOnTouchOnly:true, touchStartThreshold:5,
            onEnd:function(evt){
                if(evt.to===evt.from) return;
                const bid=evt.item.dataset.blockId;
                evt.item.remove();
                if(!bid) return;
                const newIdx=Math.max(0, evt.newIndex||0);
                // もしブロックの子エリアへのドロップかチェック
                if(evt.to.classList.contains('sortable-child-area')){
                    const pInst=parseFloat(evt.to.dataset.parentInst);
                    const parent=workspaceData.find(b=>b.instId===pInst);
                    const tpl=BLOCKS.find(b=>b.id===bid);
                    if(parent&&tpl){
                        const allowed = CHILD_RULES[parent.id]||[];
                        if(!allowed.includes(bid)){
                            // 許可されていない組み合わせ → モーダル表示
                            showCannotDropModal(tpl.text.replace(/[^　-鿿＀-￯a-zA-Z0-9 ]/g,'').trim(), parent.text.replace(/[^　-鿿＀-￯a-zA-Z0-9 ]/g,'').trim());
                        } else if(!parent.children.some(c=>c.id===bid)){
                            parent.children.splice(newIdx,0,{...tpl,instId:Math.random()});
                        }
                    }
                } else {
                    // トップレベルへのドロップ
                    addBlockAt(bid, newIdx);
                    return; // addBlockAt 内で renderWorkspace が呼ばれる
                }
                renderWorkspace(); initWorkspaceSortable();
            }
        });
        window._paletteSortables.push(s);
    });
}

const CHILD_RULES={
    if_hp_zero:['show_gameover'],
    if_enemy_dead:['sound_explosion'],
    if_caught:['add_friend'],
    if_exp_full:['level_up','heal_full'],
    if_all_defeated:['spawn_boss'],
    if_defeated_n:['spawn_boss'],
    if_boss_dead:['show_clear'],
    if_escaped:['heal'],
    if_on_spring:['heal_full','sound_heal','show_msg'],
};

function addBlock(id){
    const tpl=BLOCKS.find(b=>b.id===id); if(!tpl) return;

    // このブロックを子として受け入れられる親を探す
    // 候補となる親IDをすべて列挙
    const candidateParentIds=Object.entries(CHILD_RULES)
        .filter(([pid,children])=>children.includes(id))
        .map(([pid])=>pid);

    // ワークスペースに存在する親のうち、まだこのブロックを持っていない親を優先して探す
    // （すでに入っている親はスキップ → 別の親に入れられるようにする）
    const parentId = candidateParentIds.find(pid=>{
        const p = workspaceData.find(b=>b.id===pid);
        return p && p.children && !p.children.some(c=>c.id===id);
    });
    if(parentId){
        const parent=workspaceData.find(b=>b.id===parentId);
        if(parent){
            parent.children.push({...tpl, instId:Math.random()});
            renderWorkspace(); initWorkspaceSortable(); return;
        }
    }

    // トップレベルに追加（重複なし）
    if(!workspaceData.some(b=>b.id===id)){
        const inst={...tpl, instId:Math.random()};
        if(tpl.type==='condition') inst.children=[];
        workspaceData.push(inst);
    }
    renderWorkspace(); initWorkspaceSortable(); applyBlockConfigs();
}
function addBlockAt(id,idx){
    const tpl=BLOCKS.find(b=>b.id===id); if(!tpl) return;
    const inst={...tpl,instId:Math.random()};
    if(tpl.type==='condition') inst.children=[];
    if(!workspaceData.some(b=>b.id===id)){ workspaceData.splice(Math.max(0,idx),0,inst); }
    renderWorkspace(); initWorkspaceSortable();
}
function removeBlock(instId){
    const idx=workspaceData.findIndex(b=>b.instId===instId);
    if(idx>-1){ workspaceData.splice(idx,1); renderWorkspace(); initWorkspaceSortable(); return; }
    workspaceData.forEach(b=>{ if(b.children){ const ci=b.children.findIndex(c=>c.instId===instId); if(ci>-1) b.children.splice(ci,1); } });
    renderWorkspace(); initWorkspaceSortable(); applyBlockConfigs();
}
function setDefeatCount(instId, val){
    const blk=workspaceData.find(b=>b.instId===instId);
    if(blk) blk.defeatCount=parseInt(val);
}
function stepDefeatCount(instId, delta){
    const blk=workspaceData.find(b=>b.instId===instId);
    if(!blk) return;
    const next=Math.min(10,Math.max(1,(blk.defeatCount||3)+delta));
    blk.defeatCount=next;
    // 表示だけ即時更新（rerenderしない→ドラッグ崩れを防ぐ）
    const el=document.getElementById('dfc-'+instId);
    if(el) el.textContent=next+'たい';
}

function renderWorkspace(){
    const cont=document.getElementById('workspace-content');
    cont.style.transform='';
    cont.style.transformOrigin='';
    cont.innerHTML=workspaceData.map(b=>renderBlock(b)).join('');
    markConditionDirty();
}

function renderBlock(b){

    if(b.type==='condition'){
        const childHTML=b.children&&b.children.length
            ?b.children.map(c=>renderBlock(c)).join('')
            :`<div class="if-body-empty">ここにブロックをいれよう</div>`;
        // if_defeated_n はヘッダーに数値セレクターを表示
        let headerLabel = b.text;
        let selectorHTML = '';
        if(b.id==='if_defeated_n'){
            const cnt = b.defeatCount||3;
            selectorHTML = `<span onclick="event.stopPropagation()" onpointerdown="event.stopPropagation()" ontouchstart="event.stopPropagation()" style="display:inline-flex;align-items:center;gap:2px;margin:0 4px;pointer-events:auto;touch-action:auto;">
                <button onpointerdown="event.stopPropagation();event.preventDefault();stepDefeatCount(${b.instId},-1);" ontouchstart="event.stopPropagation();" style="width:20px;height:20px;background:rgba(0,0,0,0.3);border:none;border-radius:4px;color:white;font-weight:900;font-size:13px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;">－</button>
                <span id="dfc-${b.instId}" style="min-width:32px;text-align:center;font-weight:900;font-size:12px;">${cnt}たい</span>
                <button onpointerdown="event.stopPropagation();event.preventDefault();stepDefeatCount(${b.instId},1);" ontouchstart="event.stopPropagation();" style="width:20px;height:20px;background:rgba(0,0,0,0.3);border:none;border-radius:4px;color:white;font-weight:900;font-size:13px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;">＋</button>
            </span>`;
            headerLabel = `❓ もし`;
        }
        return `<div class="if-container" data-inst="${b.instId}">
            <div class="if-header ${b.color} ${sz.py}" style="border-radius:6px 6px 0 0">
                <span class="${sz.text} font-black">${headerLabel}</span>${selectorHTML}${b.id==='if_defeated_n'?`<span class="${sz.text} font-black">たおしたら</span>`:''}${del}
            </div>
            <div class="if-middle"><div class="if-arm ${b.color}"></div>
            <div class="if-body sortable-child-area" data-parent-inst="${b.instId}" style="min-height:28px">${childHTML}</div></div>
            <div class="if-footer ${b.color}" style="border-radius:0 0 6px 6px"></div>
        </div>`;
    }
    // 設定値サマリー表示
    let cfgSummary = '';
    if(b._cfg && b.config){
        cfgSummary = '<span style="font-size:9px;opacity:0.8;margin-left:3px;white-space:nowrap;">'
            + b.config.map(c=>`${c.label.replace(/\(.*\)/,'').trim()}:${b._cfg[c.key]??c.default}`).join(' ')
            + '</span>';
    }
    return `<div class="${b.color} text-white ${sz.py} px-3 rounded-lg font-bold flex items-center gap-1 shadow-sm cursor-grab" data-inst="${b.instId}">
        <span class="flex-1 ${sz.text}">${b.text}</span>${cfgSummary}${del}</div>`;
}

// ブロックをinstIdで探して除去し返す（トップレベル＆子供を再帰検索）
function _removeBlockByInst(instId){
    const ti=workspaceData.findIndex(b=>b.instId===instId);
    if(ti>-1) return workspaceData.splice(ti,1)[0];
    for(const b of workspaceData){
        if(b.children){
            const fi=b.children.findIndex(c=>c.instId===instId);
            if(fi>-1) return b.children.splice(fi,1)[0];
        }
    }
    return null;
}

function initWorkspaceSortable(){
    const cont=document.getElementById('workspace-content');
    if(window._wsSortable) window._wsSortable.destroy();

    const sortableOpts = {
        animation:150, forceFallback:true,
        delay:120, delayOnTouchOnly:true, touchStartThreshold:8,
        filter:'select,button,input', preventOnFilter:false,
        ghostClass:'sortable-ghost', chosenClass:'sortable-chosen',
    };

    // トップレベルのSortable
    window._wsSortable=Sortable.create(cont, Object.assign({}, sortableOpts, {
        group:{name:'blocks', pull:true, put:true},
        onEnd:function(evt){
            const inst=parseFloat(evt.item.dataset.inst);
            const blockId=evt.item.dataset.blockId;
            const newIdx=Math.max(0, evt.newIndex||0);

            // パレットからトップレベルへのドロップ
            if(blockId && isNaN(inst)){
                evt.item.remove();
                const tpl=BLOCKS.find(b=>b.id===blockId);
                if(tpl && !workspaceData.some(b=>b.id===blockId)){
                    const blk={...tpl, instId:Math.random()};
                    if(tpl.type==='condition') blk.children=[];
                    workspaceData.splice(newIdx, 0, blk);
                }
                renderWorkspace(); initWorkspaceSortable(); return;
            }

            // トップレベル内での並び替え（同じコンテナ内）
            if(evt.from===cont && evt.to===cont && !isNaN(inst)){
                const idx=workspaceData.findIndex(b=>b.instId===inst);
                if(idx>-1){
                    const [b]=workspaceData.splice(idx,1);
                    workspaceData.splice(newIdx, 0, b);
                }
                renderWorkspace(); initWorkspaceSortable();
            }
        }
    }));

    // 子エリア（もしブロックの中）のSortable
    document.querySelectorAll('.sortable-child-area').forEach(area=>{
        const pInst=parseFloat(area.dataset.parentInst);
        Sortable.create(area, Object.assign({}, sortableOpts, {
            group:{name:'blocks', pull:true, put:true},
            onEnd:function(evt){
                const parent=workspaceData.find(b=>b.instId===pInst);
                if(!parent||!parent.children){ renderWorkspace(); initWorkspaceSortable(); return; }

                const movedInst=parseFloat(evt.item.dataset.inst);
                const blockId=evt.item.dataset.blockId;
                const newIdx=Math.max(0, evt.newIndex||0);

                // パレットから子エリアへのドロップ
                if(blockId && isNaN(movedInst)){
                    evt.item.remove();
                    const tpl=BLOCKS.find(b=>b.id===blockId);
                    if(tpl && !parent.children.some(c=>c.id===blockId)){
                        parent.children.splice(newIdx, 0, {...tpl, instId:Math.random()});
                    }
                    renderWorkspace(); initWorkspaceSortable(); return;
                }

                // ワークスペース内のブロックを子エリアへ移動
                if(!isNaN(movedInst)){
                    // 同じ親内での並び替え
                    const ci=parent.children.findIndex(c=>c.instId===movedInst);
                    if(ci>-1 && evt.from===evt.to){
                        const [c]=parent.children.splice(ci,1);
                        parent.children.splice(newIdx, 0, c);
                        renderWorkspace(); initWorkspaceSortable(); return;
                    }
                    // 別の場所（トップレベル or 別の親）から移動
                    if(evt.item.parentNode) evt.item.remove();
                    const found=_removeBlockByInst(movedInst);
                    if(found){
                        const allowed2 = CHILD_RULES[parent.id]||[];
                        if(!allowed2.includes(found.id)){
                            // 許可されていない → 元の場所に戻してモーダル表示
                            workspaceData.push(found);
                            showCannotDropModal(found.text.replace(/[^　-鿿＀-￯a-zA-Z0-9 ]/g,'').trim(), parent.text.replace(/[^　-鿿＀-￯a-zA-Z0-9 ]/g,'').trim());
                        } else if(!parent.children.some(c=>c.id===found.id)){
                            parent.children.splice(newIdx, 0, found);
                        } else {
                            workspaceData.push(found); // すでに入っている場合は戻す
                        }
                    }
                    renderWorkspace(); initWorkspaceSortable(); return;
                }

                renderWorkspace(); initWorkspaceSortable();
            }
        }));
    });
}

const WS_SIZE_LEVELS = {
    1: { py:'py-1',   text:'text-[10px]', del:'text-xs'  },
    2: { py:'py-2',   text:'text-[12px]', del:'text-xs'  },
    3: { py:'py-3',   text:'text-[14px]', del:'text-sm'  },

let _tapBlockId = null; // タップされたブロックID

function tapBlock(id){
    initAudio();
    const tpl = BLOCKS.find(b=>b.id===id);
    if(!tpl) return;
    // place_spring は専用ミニマップモーダル
    if(id==='place_spring'){ openSpringPicker(); return; }
    // config がないブロックはそのまま配置
    if(!tpl.config || tpl.config.length===0){
        addBlock(id); return;
    }
    // モーダル表示
    _tapBlockId = id;
    document.getElementById('block-config-title').textContent = tpl.text + ' の設定';
    const fields = document.getElementById('block-config-fields');
    fields.innerHTML = tpl.config.map(c=>{
        if(c.type==='text'){
            // 既存ブロックの設定値を引き継ぐ
            const existingBlk = workspaceData.find(b=>b.id===tpl.id);
            const curVal = existingBlk && existingBlk._cfg && existingBlk._cfg[c.key] !== undefined
                ? existingBlk._cfg[c.key] : c.default;
            return `<div style="margin-bottom:12px;">
              <label style="font-size:11px;color:#c4b5fd;display:block;margin-bottom:4px;">${c.label}</label>
              <input id="cfg-${c.key}" type="text" maxlength="24" value="${curVal.replace(/"/g,'&quot;')}"
                style="width:100%;background:#312e81;border:1px solid #7c3aed;border-radius:6px;color:white;font-size:13px;padding:6px 8px;box-sizing:border-box;font-family:inherit;">
              <div style="font-size:9px;color:#818cf8;margin-top:3px;">最大24文字</div>
            </div>`;
        }
        return `<div style="margin-bottom:12px;">
          <label style="font-size:11px;color:#c4b5fd;display:block;margin-bottom:4px;">${c.label}</label>
          <div style="display:flex;align-items:center;gap:6px;">
            <button onpointerdown="event.preventDefault();adjustConfigVal('cfg-${c.key}',-1,${c.min},${c.max})"
              style="width:28px;height:28px;background:#4c1d95;border:none;border-radius:6px;color:white;font-size:16px;cursor:pointer;flex-shrink:0;">－</button>
            <input id="cfg-${c.key}" type="number" min="${c.min}" max="${c.max}" value="${c.default}"
              style="flex:1;background:#312e81;border:1px solid #7c3aed;border-radius:6px;color:white;font-size:14px;text-align:center;padding:5px;font-family:inherit;">
            <button onpointerdown="event.preventDefault();adjustConfigVal('cfg-${c.key}',1,${c.min},${c.max})"
              style="width:28px;height:28px;background:#4c1d95;border:none;border-radius:6px;color:white;font-size:16px;cursor:pointer;flex-shrink:0;">＋</button>
          </div>
        </div>`;
    }).join('');
    document.getElementById('block-config-modal').style.display='flex';
}

function adjustConfigVal(elId, delta, min, max){
    const el = document.getElementById(elId);
    if(!el) return;
    let v = parseInt(el.value)||0;
    v = Math.max(min, Math.min(max, v+delta));
    el.value = v;
}

function confirmBlockConfig(){
    const id = _tapBlockId;
    if(!id){ closeBlockConfig(); return; }
    const tpl = BLOCKS.find(b=>b.id===id);
    if(!tpl){ closeBlockConfig(); return; }
    // 設定値を読み取ってブロックに付与
    const configVals = {};
    (tpl.config||[]).forEach(c=>{
        const el = document.getElementById('cfg-'+c.key);
        if(!el){ configVals[c.key]=c.default; return; }
        if(c.type==='text'){
            configVals[c.key] = el.value.trim() || c.default;
        } else {
            configVals[c.key] = Math.max(c.min, Math.min(c.max, parseInt(el.value)||c.default));
        }
    });
    // addBlock の代わりに configVals つきで追加
    const candidateParentIds = Object.entries(CHILD_RULES)
        .filter(([pid,children])=>children.includes(id)).map(([pid])=>pid);
    const parentId = candidateParentIds.find(pid=>workspaceData.some(b=>b.id===pid));
    if(parentId){
        const parent = workspaceData.find(b=>b.id===parentId);
        if(parent && !parent.children.some(c=>c.id===id)){
            parent.children.push({...tpl, instId:Math.random(), _cfg:configVals});
            renderWorkspace(); initWorkspaceSortable();
        }
    } else {
        if(!workspaceData.some(b=>b.id===id)){
            const inst = {...tpl, instId:Math.random(), _cfg:configVals};
            if(tpl.type==='condition') inst.children=[];
            // if_defeated_n はdefeatCountもconfigから
            if(id==='if_defeated_n' && configVals.defeatCount) inst.defeatCount=configVals.defeatCount;
            workspaceData.push(inst);
        }
    }
    renderWorkspace(); initWorkspaceSortable();
    closeBlockConfig();
    // 設定値をゲームロジックに反映
    applyBlockConfigs();
}

// ══ かいふくエリア ミニマップピッカー ══
let _springPickerSx = 14;
let _springPickerSy = 14;
let _springPickerSize = 2;

function openSpringPicker(){
    // 既存ブロックがあれば設定を引き継ぐ
    const existing = workspaceData.find(b=>b.id==='place_spring');
    if(existing && existing._cfg){
        _springPickerSx   = existing._cfg.sx    ?? 14;
        _springPickerSy   = existing._cfg.sy    ?? 14;
        _springPickerSize = existing._cfg.ssize ?? 2;
    } else {
        _springPickerSx=14; _springPickerSy=14; _springPickerSize=2;
    }
    document.getElementById('spring-picker-modal').style.display='flex';
    updateSpringSizeBtns();
    renderSpringMinimap();
    updateSpringPosLabel();
    // キャンバスタップ登録
    const cv = document.getElementById('spring-minimap');
    cv.onpointerdown = onSpringMinimapTap;
}

function closeSpringPicker(){
    document.getElementById('spring-picker-modal').style.display='none';
}

function setSpringSize(s){
    _springPickerSize = s;
    updateSpringSizeBtns();
    renderSpringMinimap();
    updateSpringPosLabel();
}

function updateSpringSizeBtns(){
    [1,2,3,4].forEach(s=>{
        const btn = document.getElementById('szbtn-'+s);
        if(!btn) return;
        btn.style.background = (s===_springPickerSize) ? '#0e7490' : '#155e75';
        btn.style.fontWeight  = (s===_springPickerSize) ? '900' : 'normal';
    });
}

function onSpringMinimapTap(e){
    e.preventDefault();
    const cv = document.getElementById('spring-minimap');
    const rect = cv.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width;
    const py = (e.clientY - rect.top)  / rect.height;
    const cols = WORLD, rows = WORLD;
    let tx = Math.floor(px * cols);
    let ty = Math.floor(py * rows);
    // サイズ分だけはみ出ないようにクランプ
    tx = Math.max(1, Math.min(cols - _springPickerSize - 1, tx));
    ty = Math.max(1, Math.min(rows - _springPickerSize - 1, ty));
    _springPickerSx = tx;
    _springPickerSy = ty;
    renderSpringMinimap();
    updateSpringPosLabel();
}

function updateSpringPosLabel(){
    const label = document.getElementById('spring-pos-label');
    if(!label) return;
    // 位置を子ども向けの言葉で表示
    const cx = _springPickerSx + _springPickerSize/2;
    const cy = _springPickerSy + _springPickerSize/2;
    const half = WORLD/2;
    const vPos = cy < half*0.5 ? 'うえのほう' : cy < half ? 'すこしうえ' : cy < half*1.5 ? 'すこししも' : 'したのほう';
    const hPos = cx < half*0.5 ? 'ひだりのほう' : cx < half ? 'すこしひだり' : cx < half*1.5 ? 'すこしみぎ' : 'みぎのほう';
    const sizeLabel = ['','1マス','2マス(ふつう)','3マス(おおきめ)','4マス(とても大きい)'][_springPickerSize]||'';
    label.textContent = `ばしょ：${vPos}・${hPos}  おおきさ：${sizeLabel}`;
}

function renderSpringMinimap(){
    const cv = document.getElementById('spring-minimap');
    if(!cv) return;
    const dpr = window.devicePixelRatio||1;
    const W = cv.offsetWidth||280, H = cv.offsetHeight||280;
    cv.width  = W*dpr; cv.height = H*dpr;
    const ctx = cv.getContext('2d');
    ctx.scale(dpr,dpr);

    const cw = W/WORLD, ch = H/WORLD;
    const map = areaMaps[currentArea] || fieldMap;

    // マップ全体を描画
    for(let ty=0;ty<WORLD;ty++){
        for(let tx=0;tx<WORLD;tx++){
            const tile = map[ty]?.[tx] ?? TILE.GRASS;
            if(tile===TILE.WALL)   ctx.fillStyle='#44403c';
            else if(tile===TILE.PATH||tile===TILE.TOWN) ctx.fillStyle='#d97706';
            else if(tile===TILE.WATER) ctx.fillStyle='#0284c7';
            else if(tile===TILE.LAVA)  ctx.fillStyle='#dc2626';
            else if(tile===TILE.TALL)  ctx.fillStyle='#166534';
            else                       ctx.fillStyle='#15803d';
            ctx.fillRect(tx*cw, ty*ch, cw+0.5, ch+0.5);
        }
    }

    // 選択エリアをハイライト（点滅）
    const s = _springPickerSize;
    ctx.fillStyle='rgba(34,211,238,0.45)';
    ctx.fillRect(_springPickerSx*cw, _springPickerSy*ch, s*cw, s*ch);
    ctx.strokeStyle='#22d3ee';
    ctx.lineWidth=1.5;
    ctx.strokeRect(_springPickerSx*cw, _springPickerSy*ch, s*cw, s*ch);

    // 💧アイコン
    ctx.font=`${Math.max(8, s*cw*0.7)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('💧', (_springPickerSx+s/2)*cw, (_springPickerSy+s/2)*ch);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';

    // 主人公の現在位置
    const hx = hero.x/TILE_SIZE, hy = hero.y/TILE_SIZE;
    ctx.fillStyle='#fbbf24';
    ctx.beginPath(); ctx.arc(hx*cw, hy*ch, Math.max(3,cw*0.5), 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();
}

function confirmSpringPicker(){
    // ブロックをワークスペースに追加（_cfg付き）
    const tpl = BLOCKS.find(b=>b.id==='place_spring');
    if(!tpl){ closeSpringPicker(); return; }
    const cfg = { sx:_springPickerSx, sy:_springPickerSy, ssize:_springPickerSize };
    const existing = workspaceData.find(b=>b.id==='place_spring');
    if(existing){
        existing._cfg = cfg; // 既存なら設定だけ上書き
    } else {
        workspaceData.push({...tpl, instId:Math.random(), _cfg:cfg});
    }
    renderWorkspace(); initWorkspaceSortable();
    closeSpringPicker();
}

function closeBlockConfig(){
    document.getElementById('block-config-modal').style.display='none';
    _tapBlockId = null;
}

// ブロックの設定値をゲームロジックへ反映
function applyBlockConfigs(){
    // encounter_grass
    const encBlk = workspaceData.find(b=>b.id==='encounter_grass');
    if(encBlk && encBlk._cfg && encBlk._cfg.enc_rate !== undefined){
        window._customEncRate = encBlk._cfg.enc_rate / 100;
    } else { window._customEncRate = null; }
    // enemy_weak / enemy_strong
    const weakBlk   = workspaceData.find(b=>b.id==='enemy_weak');
    const strongBlk = workspaceData.find(b=>b.id==='enemy_strong');
    window._customStrength = null;
    if(weakBlk   && weakBlk._cfg   && weakBlk._cfg.strength   !== undefined) window._customStrength = weakBlk._cfg.strength / 100;
    if(strongBlk && strongBlk._cfg && strongBlk._cfg.strength !== undefined) window._customStrength = strongBlk._cfg.strength / 100;
    // rare_low / rare_high
    const rareBlk = workspaceData.find(b=>b.id==='rare_low'||b.id==='rare_high');
    if(rareBlk && rareBlk._cfg){
        customRareNoaProb    = rareBlk._cfg.noa_prob    !== undefined ? rareBlk._cfg.noa_prob    : null;
        customRareGiganoProb = rareBlk._cfg.gigano_prob !== undefined ? rareBlk._cfg.gigano_prob : null;
    }
}

// モーダル外タップで閉じる
document.addEventListener('DOMContentLoaded', ()=>{
    const m = document.getElementById('block-config-modal');
    if(m) m.addEventListener('pointerdown', e=>{
        if(e.target===m) closeBlockConfig();
    });
});

document.getElementById('game-container-play').addEventListener('pointerdown',e=>{
    if(battle&&battle.waitingTap){ e.preventDefault(); initAudio(); advanceBattleMsg(); }
});

document.getElementById('play-btn-header').addEventListener('click',()=>{
    initAudio();
    if(isGameOver||isWin) resetGameState();
    isPlaying=!isPlaying;
    if(isPlaying){ switchView('play'); buildMap(); placeEncounters(); customizeApplied=false; }
    else { stopBGM(); }
    updatePlayBtn();
});

document.addEventListener('contextmenu',e=>{ if(e.target.closest('#view-play')) e.preventDefault(); });

window.onload=function(){

    Object.keys(AREA_DEFS).forEach(id=>buildAreaMap(id));

    renderPalette();

};

}
function closeRareProbModal(){

}
function adjustRareProb(type, delta){
    const id = type==='noa' ? 'rare-noa-input' : 'rare-gigano-input';
    const el = document.getElementById(id);
    if(!el) return;
    el.value = Math.max(0, Math.min(50, (parseInt(el.value)||0) + delta));
}
function applyRareProb(){
    const noa    = parseInt(document.getElementById('rare-noa-input').value)    || 0;
    const gigano = parseInt(document.getElementById('rare-gigano-input').value) || 0;
    customRareNoaProb    = noa;
    customRareGiganoProb = gigano;
    closeRareProbModal();
}

window.addEventListener('resize',()=>renderGame());
